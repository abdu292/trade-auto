name: trade_auto_ui
description: Trade Auto platform UI
publish_to: "none"
version: 0.3.2+3

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  shared_preferences: ^2.3.3
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/trade_auto.png
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/trade_auto.png
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: assets/trade_auto.png
    icon_size: 48
  macos:
    generate: true
    image_path: assets/trade_auto.png

flutter_native_splash:
  color: "#000000"
  image: assets/trade_auto.png
  color_dark: "#000000"
  image_dark: assets/trade_auto.png
  android: true
  ios: true
  web: true
  fullscreen: true
  android_gravity: center
  ios_content_mode: center
  web_image_mode: center
  android_12:
    image: assets/trade_auto.png
    image_dark: assets/trade_auto.png
    icon_background_color: "#000000"
    icon_background_color_dark: "#000000"

flutter:
  uses-material-design: true
